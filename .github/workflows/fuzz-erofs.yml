name: Periodic EROFS Fuzzing

on:
  schedule:
    # Run weekly on Sunday at 02:00 UTC.
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  userspace-fuzzing:
    name: Userspace structured and libFuzzer campaign
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Initialize shallow submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --depth=1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Install nightly Rust toolchain
        run: rustup toolchain install nightly --profile minimal

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            acl attr autoconf automake bc bison build-essential clang cpio flex gzip \
            liblz4-dev liblzma-dev libssl-dev libtool libtool-bin \
            libzstd-dev llvm openssl pkg-config qemu-system-x86 rsync \
            uuid-dev zlib1g-dev

      - name: Build erofs-utils
        run: make erofs-utils

      - name: Install fsck fixture
        run: cp build/erofs-utils/fsck/fsck.erofs tests/fixtures/fsck.erofs

      - name: Run Rust tests
        run: RUSTFLAGS="-D warnings" cargo test --locked

      - name: Generate seed corpus
        run: |
          ./scripts/generate-seed-corpus.sh
          ./scripts/generate-complex-seeds.sh
          ./scripts/generate-seed-matrix.sh
          python3 -m json.tool corpus/seeds/matrix/manifest.json >/dev/null

      - name: Build erofs-rs CLI
        run: cargo build --locked --release

      - name: Run structured mutations (raw checksum barrier)
        run: |
          targets=(
            superblock
            inode
            dirent
            xattr
            chunk
            compression
            fragment
            device
            cross
          )
          for target in "${targets[@]}"; do
            mkdir -p "corpus/mutated/${target}"
            ./target/release/erofs-rs mutate \
              --input corpus/seeds/single.erofs \
              --output-dir "corpus/mutated/${target}/" \
              --manifest "corpus/mutated/${target}/manifest.txt" \
              --fsck build/erofs-utils/fsck/fsck.erofs \
              --target "$target"
          done

      - name: Collect artifact corpus
        run: |
          ./target/release/erofs-rs corpus \
            --mode hash \
            --input-dir corpus/mutated/ \
            --output-dir corpus/artifacts/ \
            --report corpus/artifacts/report.txt

      - name: Run erofs-utils safety smoke
        run: |
          ARTIFACT_DIRS="corpus/mutated corpus/artifacts" \
            LOG_DIR=corpus/erofs-utils-safety \
            ./scripts/erofs-utils-safety-smoke.sh

      - name: Build fuzzer
        run: ./scripts/build-erofs-utils-fuzzing.sh

      - name: Run short fuzzing session
        run: |
          mkdir -p corpus/fuzz-out
          ./build/erofs-utils-fuzz/fsck/fuzz_erofsfsck \
            corpus/seeds/ corpus/fuzz-out/ \
            -max_total_time=120 -print_final_stats=1 \
            2>&1 | tee corpus/fuzz-out/fuzz.log

      - name: Run Rust libFuzzer campaign
        run: |
          mkdir -p corpus/rust-fuzz
          cmin_jsonl="corpus/rust-fuzz/cmin-summary.jsonl"
          cmin_summary="corpus/rust-fuzz/cmin-summary.json"
          : > "$cmin_jsonl"
          cargo_fuzz_version="$(cargo fuzz --version)"
          rustc_version="$(rustc +nightly --version)"
          targets=(
            superblock_parse
            inode_locate
            dirent_locate
            checksum_fix_no_panic
            info_no_panic
            inject_named_field
            xattr_parse
            chunk_parse
            compression_parse
            parser_differential
            kernel_dmesg_classify
            fsck_output_classify
            report_schema_parse
          )
          for target in "${targets[@]}"; do
            corpus_dir="corpus/rust-fuzz/${target}/corpus"
            artifact_dir="corpus/rust-fuzz/${target}/artifacts"
            mkdir -p "$corpus_dir" "$artifact_dir"
            cargo +nightly fuzz run "$target" "$corpus_dir" -- \
              -max_total_time=30 \
              -artifact_prefix="${artifact_dir}/" \
              -print_final_stats=1 \
              2>&1 | tee "corpus/rust-fuzz/${target}/run.log"
            before_cmin_units="$(find "$corpus_dir" -type f | wc -l | tr -d '[:space:]')"
            cargo +nightly fuzz cmin "$target" "$corpus_dir" -- \
              -max_total_time=30 \
              2>&1 | tee "corpus/rust-fuzz/${target}/cmin.log"
            after_cmin_units="$(find "$corpus_dir" -type f | wc -l | tr -d '[:space:]')"
            artifact_count="$(find "$artifact_dir" -type f | wc -l | tr -d '[:space:]')"
            cargo +nightly fuzz run "$target" "$corpus_dir" -- \
              -runs=0 \
              -artifact_prefix="${artifact_dir}/" \
              2>&1 | tee "corpus/rust-fuzz/${target}/regression.log"
            python3 - "$cmin_jsonl" "$target" "$before_cmin_units" \
              "$after_cmin_units" "$artifact_count" "$corpus_dir" "$artifact_dir" <<'PY'
          import json
          import sys

          (
              output,
              target,
              before_cmin_units,
              after_cmin_units,
              artifact_count,
              corpus_dir,
              artifact_dir,
          ) = sys.argv[1:]
          entry = {
              "target": target,
              "corpus_dir": corpus_dir,
              "artifact_dir": artifact_dir,
              "before_cmin_units": int(before_cmin_units),
              "after_cmin_units": int(after_cmin_units),
              "artifact_count": int(artifact_count),
              "run_log": f"corpus/rust-fuzz/{target}/run.log",
              "cmin_log": f"corpus/rust-fuzz/{target}/cmin.log",
              "regression_log": f"corpus/rust-fuzz/{target}/regression.log",
          }
          with open(output, "a", encoding="utf-8") as handle:
              handle.write(json.dumps(entry, sort_keys=True) + "\n")
          PY
          done
          python3 - "$cmin_jsonl" "$cmin_summary" \
            "$cargo_fuzz_version" "$rustc_version" <<'PY'
          import json
          import sys
          from pathlib import Path

          jsonl, output, cargo_fuzz_version, rustc_version = sys.argv[1:]
          entries = [
              json.loads(line)
              for line in Path(jsonl).read_text(encoding="utf-8").splitlines()
              if line.strip()
          ]
          report = {
              "schema": "erofs-rs.cmin-summary.v1",
              "engine": "cargo-fuzz",
              "engine_version": cargo_fuzz_version,
              "toolchain": rustc_version,
              "run_flags": [
                  "-max_total_time=30",
                  "-artifact_prefix=<target-artifact-dir>/",
                  "-print_final_stats=1",
              ],
              "cmin_flags": ["-max_total_time=30"],
              "regression_flags": [
                  "-runs=0",
                  "-artifact_prefix=<target-artifact-dir>/",
              ],
              "targets": entries,
          }
          with open(output, "w", encoding="utf-8") as handle:
              json.dump(report, handle, indent=2, sort_keys=True)
              handle.write("\n")
          PY
          rm -f "$cmin_jsonl"

      - name: Collect minimized Rust fuzz corpus
        run: |
          ./target/release/erofs-rs corpus \
            --mode coverage \
            --input-dir corpus/rust-fuzz/ \
            --output-dir corpus/minimized/rust-fuzz/ \
            --report corpus/minimized/rust-fuzz/report.txt

      - name: Build sanitizer erofs-utils
        run: ./scripts/build-erofs-utils-sanitized.sh

      - name: Run sanitizer erofs-utils safety smoke
        run: |
          MKFS="$PWD/build/erofs-utils-sanitized/mkfs/mkfs.erofs" \
          FSCK="$PWD/build/erofs-utils-sanitized/fsck/fsck.erofs" \
          DUMP="$PWD/build/erofs-utils-sanitized/dump/dump.erofs" \
          INPUT_DIR="$PWD/corpus/seeds" \
          ARTIFACT_DIRS="$PWD/corpus/mutated $PWD/corpus/artifacts" \
          LOG_DIR="$PWD/corpus/erofs-utils-safety-sanitized" \
          TOOL_TIMEOUT=15s \
          MAX_IMAGES=100 \
            ./scripts/erofs-utils-safety-smoke.sh

      - name: Upload fuzzing artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: erofs-fuzzing-artifacts
          path: |
            corpus/artifacts/
            corpus/fuzz-out/
            corpus/minimized/
            corpus/rust-fuzz/
            corpus/rust-fuzz/cmin-summary.json
            corpus/seeds/matrix/manifest.json
            corpus/erofs-utils-safety/
            corpus/erofs-utils-safety-sanitized/
            corpus/mutated/*/manifest.txt
          retention-days: 14
