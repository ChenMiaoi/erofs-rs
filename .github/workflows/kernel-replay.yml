name: Scheduled Kernel Replay

on:
  schedule:
    # Run weekly on Monday at 03:00 UTC, separate from userspace fuzzing.
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  kernel-replay:
    name: Replay curated kernel candidates
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Detect replay candidates
        id: candidates
        shell: bash
        run: |
          set -euo pipefail
          queue="corpus/crashes/kernel-candidates"
          out_dir="kernel-replay"
          mkdir -p "$out_dir"

          if [ ! -d "$queue" ]; then
            echo "has_candidates=false" >> "$GITHUB_OUTPUT"
            {
              echo "No kernel replay queue found at $queue."
              echo "Add curated .erofs images on a replay branch to run QEMU checks."
            } > "$out_dir/summary.txt"
            python3 - "$queue" "$out_dir/summary.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          queue, output = sys.argv[1:]
          summary = {
              "schema": "erofs-rs.kernel-replay-summary.v1",
              "queue": queue,
              "candidate_count": 0,
              "failure_count": 0,
              "reports": [],
          }
          Path(output).write_text(json.dumps(summary, indent=2) + "\n")
          PY
            exit 0
          fi

          mapfile -t candidates < <(find "$queue" -type f -name '*.erofs' | sort)
          if [ "${#candidates[@]}" -eq 0 ]; then
            echo "has_candidates=false" >> "$GITHUB_OUTPUT"
            {
              echo "No .erofs kernel replay candidates found in $queue."
              echo "Add curated images before expecting QEMU replay reports."
            } > "$out_dir/summary.txt"
            python3 - "$queue" "$out_dir/summary.json" <<'PY'
          import json
          import sys
          from pathlib import Path

          queue, output = sys.argv[1:]
          summary = {
              "schema": "erofs-rs.kernel-replay-summary.v1",
              "queue": queue,
              "candidate_count": 0,
              "failure_count": 0,
              "reports": [],
          }
          Path(output).write_text(json.dumps(summary, indent=2) + "\n")
          PY
            exit 0
          fi

          echo "has_candidates=true" >> "$GITHUB_OUTPUT"
          printf '%s\n' "${candidates[@]}" > "$out_dir/candidates.txt"
          printf 'Found %s kernel replay candidate(s).\n' "${#candidates[@]}" \
            > "$out_dir/summary.txt"

      - name: Initialize shallow submodules
        if: steps.candidates.outputs.has_candidates == 'true'
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --depth=1

      - name: Install Rust toolchain
        if: steps.candidates.outputs.has_candidates == 'true'
        uses: dtolnay/rust-toolchain@1.85.0

      - name: Install native dependencies
        if: steps.candidates.outputs.has_candidates == 'true'
        run: make apt-deps

      - name: Build replay tools
        if: steps.candidates.outputs.has_candidates == 'true'
        run: |
          cargo build --locked --release
          make kernel initramfs

      - name: Replay kernel candidates
        if: steps.candidates.outputs.has_candidates == 'true'
        shell: bash
        run: |
          set -euo pipefail
          report_dir="kernel-replay/reports"
          mkdir -p "$report_dir"
          entries_jsonl="kernel-replay/summary-entries.jsonl"
          : > "$entries_jsonl"
          kernel_git="$(git -C vendor/linux rev-parse HEAD 2>/dev/null || true)"
          kernel_args=()
          if [ -n "$kernel_git" ]; then
            kernel_args=(--kernel-git "$kernel_git")
          fi
          failures=0

          {
            echo "| candidate | replay | qemu_rc | report |"
            echo "|---|---|---:|---|"
          } > kernel-replay/replay-table.md

          while IFS= read -r img; do
            sha="$(sha256sum "$img" | awk '{print $1}')"
            stem="$(basename "${img%.erofs}")"
            safe_stem="$(printf '%s' "$stem" | tr -c 'A-Za-z0-9._-' '_')"
            prefix="${safe_stem}-${sha:0:12}"
            qemu_log="$report_dir/${prefix}.qemu.log"
            qemu_rc_file="$report_dir/${prefix}.qemu.rc"
            json_report="$report_dir/${prefix}.kernel-report.json"

            replay="rejected"
            if ! make -o kernel -o initramfs smoke-malformed \
              MALFORMED_IMG="$img" \
              MALFORMED_QEMU_LOG="$qemu_log" \
              MALFORMED_QEMU_EXIT_CODE="$qemu_rc_file"; then
              replay="needs-triage"
            fi

            qemu_rc="$(cat "$qemu_rc_file" 2>/dev/null || printf '1')"
            report="written"
            if ! ./target/release/erofs-rs kernel-report \
              --dmesg "$qemu_log" \
              --qemu-exit-code "$qemu_rc" \
              --artifact "$img" \
              --artifact-sha256 "$sha" \
              "${kernel_args[@]}" \
              --output "$json_report"; then
              report="failed"
            fi
            if [ "$replay" != "rejected" ] || [ "$report" != "written" ]; then
              failures=$((failures + 1))
            fi

            printf '| `%s` | %s | %s | %s |\n' \
              "$img" "$replay" "$qemu_rc" "$report" \
              >> kernel-replay/replay-table.md
            python3 - "$entries_jsonl" "$img" "$sha" "$qemu_rc" \
              "$replay" "$report" "$json_report" <<'PY'
          import json
          import sys

          (
              output,
              candidate,
              artifact_sha256,
              qemu_exit_code,
              replay_status,
              report_status,
              report_path,
          ) = sys.argv[1:]
          entry = {
              "candidate": candidate,
              "artifact_sha256": artifact_sha256,
              "qemu_exit_code": int(qemu_exit_code),
              "replay_status": replay_status,
              "report_status": report_status,
              "report_path": report_path,
          }
          with open(output, "a", encoding="utf-8") as stream:
              stream.write(json.dumps(entry, sort_keys=True) + "\n")
          PY
          done < kernel-replay/candidates.txt

          python3 - "$entries_jsonl" "$failures" kernel-replay/summary.json <<'PY'
          import json
          import sys
          from pathlib import Path

          entries_path, failures, output = sys.argv[1:]
          reports = [
              json.loads(line)
              for line in Path(entries_path).read_text().splitlines()
              if line.strip()
          ]
          summary = {
              "schema": "erofs-rs.kernel-replay-summary.v1",
              "queue": "corpus/crashes/kernel-candidates",
              "candidate_count": len(reports),
              "failure_count": int(failures),
              "reports": reports,
          }
          Path(output).write_text(json.dumps(summary, indent=2) + "\n")
          PY

          {
            cat kernel-replay/summary.txt
            echo
            cat kernel-replay/replay-table.md
            echo
            printf 'Replay failures requiring triage: %s\n' "$failures"
          } > kernel-replay/summary.md

          cat kernel-replay/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload kernel replay reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kernel-replay-reports
          path: kernel-replay/
          retention-days: 14
